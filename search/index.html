<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <nav class="navbar navbar-expand px-4 py-2 sticky-top" aria-label="Main navigation">
    <button id="themeToggle" class="btn btn-sm btn-outline-secondary" aria-label="Toggle theme">
    <i class="bi bi-sun" aria-hidden="true"></i>
    </button>   
    <div class="container-fluid justify-content-center gap-4">
      <a class="nav-link" href="../search" aria-label="Search" aria-current="page">
        <i class="bi bi-search" aria-hidden="true"></i>
      </a>
      <a class="nav-link" href="..">Home</a>
      <a class="nav-link" href="../library">Library</a>
      <a class="nav-link" href="../watchlist">Watchlist</a>
    </div>
  </nav>

  <main class="px-3 py-3 px-sm-4 py-sm-4">
    <form role="search" class="mb-4">
      <label for="searchInput" class="visually-hidden">Search movies and TV shows</label>
      <input type="search" class="form-control form-control-lg" placeholder="Search movies..." id="searchInput" aria-label="Search movies and TV shows">
    </form>

    <div id="searchResults" aria-live="polite" aria-label="Search results"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../JS/api.js"></script>
  <script src="../JS/search.js"></script>
  <script src="../JS/storage.js"></script>
  <script src="../JS/library.js"></script>
  <script src="../JS/watchlist.js"></script>
  <script src="../JS/theme.js"></script>
</body>
</html>
