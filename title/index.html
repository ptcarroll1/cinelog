<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="title.css">
</head>
<body>

  <nav class="navbar navbar-expand px-4 py-2 sticky-top" aria-label="Main navigation">
    <button id="themeToggle" class="btn btn-sm btn-outline-secondary" aria-label="Toggle theme">
      <i class="bi bi-sun"></i>
    </button>
    <div class="container-fluid justify-content-center gap-4">
      <a class="nav-link" href="../search" aria-label="Search">
        <i class="bi bi-search" aria-hidden="true"></i>
      </a>
      <a class="nav-link" href="..">Home</a>
      <a class="nav-link" href="../library">Library</a>
      <a class="nav-link" href="../watchlist">Watchlist</a>
    </div>
  </nav>

  <div class="hero-backdrop" id="heroBackdrop">
    <div class="position-relative z-1 px-3 px-sm-4 px-md-5 pt-4 pb-0 d-flex align-items-end" style="min-height:340px;">
    </div>
  </div>

  <main class="px-3 px-sm-4 px-md-5 pb-5" style="margin-top:-80px; position:relative; z-index:1;">
    <div class="row g-4 g-xl-5 align-items-start">

      <!-- Left column -->
      <div class="col-12 col-lg-8">

        <div class="d-flex gap-4 align-items-end mb-4">
          <img src="" alt="" class="movie-poster flex-shrink-0 rounded-3" id="moviePoster">
          <div>
            <h1 class="fs-2 fw-bold mb-1" id="movieTitle"></h1>
            <div class="d-flex flex-wrap align-items-center gap-2 mb-3 text-secondary small" id="movieMeta"></div>
            <div class="d-flex flex-wrap gap-2 mb-3" id="movieGenres"></div>
            <div class="d-flex gap-2 flex-wrap">
              <button id="btnLibrary" class="btn btn-action btn-sm d-flex align-items-center gap-2" aria-label="Add to Library">
                <i class="bi bi-collection"></i>
                <span>Library</span>
              </button>
              <button id="btnWatchlist" class="btn btn-action btn-sm d-flex align-items-center gap-2" aria-label="Add to Watchlist">
                <i class="bi bi-bookmark"></i>
                <span>Watchlist</span>
              </button>
            </div>
          </div>
        </div>

        <div class="d-flex flex-wrap gap-3 mb-5">
          <div class="stat-box rounded-3 py-2 px-3 text-center">
            <div class="fs-5 fw-semibold text-white" id="statScore">—</div>
            <div class="stat-label text-uppercase text-secondary">TMDB</div>
          </div>
          <div class="stat-box rounded-3 py-2 px-3 text-center">
            <div class="fs-5 fw-semibold text-white" id="statVotes">—</div>
            <div class="stat-label text-uppercase text-secondary">Votes</div>
          </div>
          <div class="stat-box rounded-3 py-2 px-3 text-center">
            <div class="fs-5 fw-semibold text-white" id="statRevenue">—</div>
            <div class="stat-label text-uppercase text-secondary">Box Office</div>
          </div>
        </div>

        <section class="mb-5" aria-labelledby="overview-heading">
          <h2 id="overview-heading" class="fs-6 fw-semibold mb-2">Overview</h2>
          <p class="text-secondary" id="movieOverview" style="line-height:1.7;"></p>
        </section>

        <section class="mb-5" aria-labelledby="details-heading">
          <h2 id="details-heading" class="fs-6 fw-semibold mb-3">Details</h2>
          <dl class="row small" id="detailsList" style="max-width:500px;"></dl>
        </section>

        <section aria-labelledby="cast-heading">
          <h2 id="cast-heading" class="fs-6 fw-semibold mb-3">Top Cast</h2>
          <div class="d-flex flex-wrap gap-4" id="castList"></div>
        </section>

      </div>

      <!-- Right column -->
      <div class="col-12 col-lg-4">
        <div class="sticky-lg-top right-sticky">

          <!-- Star rating -->
          <div class="side-panel rounded-3 mb-3">
            <h2 class="fs-6 fw-semibold mb-3 text-white">Your Rating</h2>
            <div class="d-flex gap-2 justify-content-center mb-2" id="starRating" role="group" aria-label="Rate this title">
              <i class="bi bi-star star-btn fs-2" data-star="1" role="button" tabindex="0" aria-label="1 star"></i>
              <i class="bi bi-star star-btn fs-2" data-star="2" role="button" tabindex="0" aria-label="2 stars"></i>
              <i class="bi bi-star star-btn fs-2" data-star="3" role="button" tabindex="0" aria-label="3 stars"></i>
              <i class="bi bi-star star-btn fs-2" data-star="4" role="button" tabindex="0" aria-label="4 stars"></i>
              <i class="bi bi-star star-btn fs-2" data-star="5" role="button" tabindex="0" aria-label="5 stars"></i>
            </div>
            <div class="text-center text-white small" id="ratingLabel">Not rated</div>
            <div class="text-center mt-2" id="clearRatingWrap" style="display:none;">
              <button id="clearRatingBtn" class="btn btn-sm" style="font-size:0.75rem; color:#888; background:none; border:none; padding:0; text-decoration:underline;">Clear rating</button>
            </div>
          </div>

          <!-- Reviews -->
          <div class="side-panel rounded-3">
            <h2 class="fs-6 fw-semibold mb-3 text-white">Reviews</h2>
            <textarea
              id="reviewInput"
              class="form-control review-textarea mb-2"
              rows="4"
              placeholder="Write your review..."
            ></textarea>
            <button id="submitReview" class="btn btn-action btn-sm w-100 mb-4">Post Review</button>
            <div id="reviewsList"></div>
          </div>

        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../JS/api.js"></script>
  <script src="../JS/storage.js"></script>
  <script src="../JS/title.js"></script>
  <script src="../JS/theme.js"></script>
</body>
</html>
