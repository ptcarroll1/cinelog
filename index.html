<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>


<body>

  <nav class="navbar navbar-expand px-4 py-2 sticky-top" aria-label="Main navigation">
    <button id="themeToggle" class="btn btn-sm btn-outline-secondary" aria-label="Toggle theme">
    <i class="bi bi-sun" aria-hidden="true"></i>
    </button>
    <div class="mx-auto d-flex gap-4">
      <a class="nav-link" href="search" aria-label="Search">
        <i class="bi bi-search" aria-hidden="true"></i>
      </a>
      <a class="nav-link" aria-current="page" data-i18n="nav.home">Home</a>
      <a class="nav-link" href="library" data-i18n="nav.library">Library</a>
      <a class="nav-link" href="watchlist" data-i18n="nav.watchlist">Watchlist</a>
    </div>
    <div class="dropdown">
      <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Select language">
        <i class="bi bi-globe" aria-hidden="true"></i> EN
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item active" href="#" data-lang="en-US">English</a></li>
        <li><a class="dropdown-item" href="#" data-lang="es-ES">Español</a></li>
        <li><a class="dropdown-item" href="#" data-lang="fr-FR">Français</a></li>
        <li><a class="dropdown-item" href="#" data-lang="de-DE">Deutsch</a></li>
        <li><a class="dropdown-item" href="#" data-lang="ja-JP">日本語</a></li>
      </ul>
    </div>
  </nav>

  <main class="px-3 py-3 px-sm-4 py-sm-4 px-md-5 py-md-5">
    <h1 class="visually-hidden">CineLog</h1>

    <section aria-labelledby="trending-heading">
      <h2 id="trending-heading" class="fs-6 fw-semibold mb-3" data-i18n="home.trending">Trending</h2>
      <div id="trending" class="row row-cols-3 row-cols-lg-6 g-4"></div>
    </section>

    <section class="mb-5" aria-labelledby="popular-heading">
      <h2 id="popular-heading" class="fs-6 fw-semibold mt-5 mb-3" data-i18n="home.popular">Popular</h2>
      <div id="popular" class="row row-cols-3 row-cols-md-4 row-cols-lg-6 g-4"></div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="JS/language.js"></script>
  <script src="JS/api.js"></script>
  <script src="JS/home.js"></script>
  <script src="JS/search.js"></script>
  <script src="JS/storage.js"></script>
  <script src="JS/library.js"></script>
  <script src="JS/watchlist.js"></script>
  <script src="JS/theme.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
  }
</script>
</body>
</html>
