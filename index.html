<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="navbar navbar-expand px-4 py-2 sticky-top" aria-label="Main navigation">
    <button id="themeToggle" class="btn btn-sm btn-outline-secondary" aria-label="Toggle theme">
    <i class="bi bi-sun"></i>
    </button>
    <div class="container-fluid justify-content-center gap-4">
      <a class="nav-link" href="search" aria-label="Search">
        <i class="bi bi-search" aria-hidden="true"></i>
      </a>
      <a class="nav-link" aria-current="page">Home</a>
      <a class="nav-link" href="library">Library</a>
      <a class="nav-link" href="watchlist">Watchlist</a>
    </div>
  </nav>

  <main class="px-3 py-3 px-sm-4 py-sm-4 px-md-5 py-md-5">
    <h1 class="visually-hidden">CineLog</h1>

    <section class="mb-5" aria-labelledby="recommended-heading">
      <h2 id="recommended-heading" class="fs-6 fw-semibold mb-3">Recommended</h2>
      <div id="popular" class="row row-cols-3 row-cols-lg-6 g-4"></div>
    </section>

    <section aria-labelledby="trending-heading">
      <h2 id="trending-heading" class="fs-6 fw-semibold mb-3">Trending</h2>
      <div id="trending" class="row row-cols-3 row-cols-lg-6 g-4"></div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="JS/api.js"></script>
  <script src="JS/home.js"></script>
  <script src="JS/search.js"></script>
  <script src="JS/storage.js"></script>
  <script src="JS/library.js"></script>
  <script src="JS/watchlist.js"></script>
  <script src="JS/theme.js"></script>
</body>
</html>
